name: Deploy site to Azure Static Web Apps

# Trigger:
#  - main pushes that touch the web/ directory deploy production
#  - pull requests against main get a staging preview environment
#    automatically wired up by the Azure SWA action
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/swa-deploy.yml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
    paths:
      - "web/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build & deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      # The SWA action calls `npm run build` internally with the same
      # working directory it would for any Node project. Stripe secret
      # injects into process.env so loadPricing() hits the live Stripe
      # account at build time instead of the hard-coded fallback.
      - name: Build & deploy
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "web"
          api_location: ""
          output_location: "dist"
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - name: Close PR preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
